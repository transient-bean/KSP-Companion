                                  const isAsteroid = maneuver.id === 'custom_redirect';
                                  return (
                                    <div key={maneuver.id} className="relative group">
                                      <button onClick={() => handleToggleManeuver(stage.id, maneuver.id)} className={`w-full text-left p-2 pr-8 rounded border flex flex-col justify-between transition-all ${isAssigned ? (isAsteroid ? 'bg-amber-900/40 border-amber-500 text-white' : isCustom ? 'bg-emerald-900/40 border-emerald-500 text-white' : 'bg-indigo-900/50 border-indigo-500 text-white') : 'bg-slate-900 border-slate-700 text-slate-400 hover:border-slate-500'}`}>
                                        <span className="text-sm font-medium block truncate pr-1">{maneuver.name}</span>
                                        <span className={`text-xs font-mono mt-1 ${isAssigned ? (isAsteroid ? 'text-amber-300' : isCustom ? 'text-emerald-300' : 'text-indigo-300') : 'text-slate-500'}`}>Base: {maneuver.dv}</span>
                                      </button>
                                      <button onClick={(e) => { e.stopPropagation(); openInfo(maneuver.name, maneuver.description); }} className={`absolute right-2 top-1/2 -translate-y-1/2 p-1 rounded-full transition-colors ${isAssigned ? 'text-slate-300 hover:text-white' : 'text-slate-600 hover:text-slate-400'}`}><HelpCircle className="w-3.5 h-3.5" /></button>
                                    </div>
                                  );
                                })}
                              </div>
                              {hasAssigned && (
                                <div className="mt-4 pt-4 border-t border-slate-700/50">
                                  <button onClick={() => toggleHardware(stage.id)} className="flex items-center gap-2 text-sm font-medium text-slate-300 hover:text-white w-full">
                                    <Cpu className="w-4 h-4 text-slate-400" /> Hardware Recommendations {expandedHardware[stage.id] ? <ChevronUp className="w-4 h-4 ml-auto" /> : <ChevronDown className="w-4 h-4 ml-auto" />}
                                  </button>
                                  {expandedHardware[stage.id] && (
                                    <div className="mt-3 space-y-3 bg-slate-900/50 rounded-lg p-3 border border-slate-700">
                                      {stage.assignedManeuvers.map(mId => {
                                        const maneuver = allManeuvers.find(m => m.id === mId);
                                        if (!maneuver) return null;
                                        return (
                                          <div key={`rec-${mId}`} className="text-sm">
                                            <h4 className="text-indigo-300 font-medium mb-1 border-b border-slate-700 pb-1">{maneuver.name}</h4>
                                            <div className="grid grid-cols-1 sm:grid-cols-3 gap-2 mt-2">
                                              <div className="flex items-start gap-2"><Zap className="w-4 h-4 text-amber-400 mt-0.5 shrink-0" /><div><span className="block text-xs text-slate-500">Battery</span><span className="text-slate-300 text-xs">{maneuver.rec.battery}</span></div></div>
                                              <div className="flex items-start gap-2"><Droplet className="w-4 h-4 text-emerald-400 mt-0.5 shrink-0" /><div><span className="block text-xs text-slate-500">Monoprop</span><span className="text-slate-300 text-xs">{maneuver.rec.monoprop}</span></div></div>
                                              <div className="flex items-start gap-2"><Cpu className="w-4 h-4 text-blue-400 mt-0.5 shrink-0" /><div><span className="block text-xs text-slate-500">Generation</span><span className="text-slate-300 text-xs">{maneuver.rec.generation}</span></div></div>
                                            </div>
                                          </div>
                                        );
                                      })}
                                    </div>
                                  )}
                                </div>
                              )}
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  </div>
                </div>
              </div>
            )}

            {/* TAB 2: LIVE TELEMETRY MANAGER */}
            {activeTab === 'telemetry' && (
              <div className="max-w-4xl mx-auto p-4 md:p-8 space-y-6 animate-in fade-in duration-300 relative">
                
                <div className="bg-slate-800 rounded-xl border border-slate-700 shadow-xl overflow-hidden mb-6">
                  <div className="p-4 md:p-6 bg-slate-900 border-b border-slate-700 flex flex-col md:flex-row items-center justify-between gap-4">
                    <div className="text-center sm:text-left flex-1 w-full">
                      <h2 className="text-xl font-bold text-white flex items-center justify-center sm:justify-start gap-2">
                        <Database className="w-5 h-5 text-emerald-400" /> Data Link Gateway
                      </h2>
                      <p className="text-slate-400 text-sm mt-1">Connect your dashboard to a live flight environment via Telemachus.</p>
                    </div>
                    
                    <div className="w-full md:w-auto flex flex-col gap-2 shrink-0">
                      <div className="flex bg-slate-800 p-1 rounded-lg border border-slate-700 relative">
                        <div className="absolute inset-0 pointer-events-none" style={{ backgroundColor: isLiveConnected ? 'rgba(0,0,0,0.5)' : 'transparent' }}></div>
                        <button onClick={() => !isLiveConnected && setConnectionMode('mock')} className={`flex-1 flex items-center justify-center gap-1.5 px-3 py-1.5 rounded-md text-xs font-bold transition-all ${connectionMode === 'mock' ? 'bg-indigo-600 text-white shadow' : 'text-slate-400 hover:text-slate-200 hover:bg-slate-700/50'}`}>
                          Simulated
                        </button>
                        <button onClick={() => !isLiveConnected && setConnectionMode('live')} className={`flex-1 flex items-center justify-center gap-1.5 px-3 py-1.5 rounded-md text-xs font-bold transition-all ${connectionMode === 'live' ? 'bg-emerald-600 text-white shadow' : 'text-slate-400 hover:text-slate-200 hover:bg-slate-700/50'}`}>
                          Live Game
                        </button>
                      </div>
                      
                      {connectionMode === 'live' && (
                        <div className="flex flex-col gap-2 w-full mt-2">
                          <div className="flex items-center gap-2" title={`Telemachus Status: ${telemachusStatus}`}>
                            <span className={`w-2 h-2 rounded-full shrink-0 ${telemachusStatus === 'connected' ? 'bg-emerald-500 shadow-[0_0_8px_rgba(16,185,129,0.8)]' : telemachusStatus === 'error' ? 'bg-red-500' : telemachusStatus === 'connecting' ? 'bg-amber-500 animate-pulse' : 'bg-slate-600'}`}></span>
                            <span className="text-[10px] text-slate-400 font-bold uppercase w-20">Telemachus</span>
                            <input type="text" value={telemachusAddress} onChange={(e) => setTelemachusAddress(e.target.value)} disabled={isLiveConnected} className="w-full bg-slate-800 border border-slate-600 rounded p-1.5 text-xs text-white focus:outline-none focus:border-emerald-500 font-mono disabled:opacity-50" placeholder="ws://IP:8080/datalink" />
                          </div>
                          <div className="flex items-center gap-2" title={`kRPC Status: ${krpcStatus}`}>
                            <span className={`w-2 h-2 rounded-full shrink-0 ${krpcStatus === 'connected' ? 'bg-indigo-500 shadow-[0_0_8px_rgba(99,102,241,0.8)]' : krpcStatus === 'error' ? 'bg-red-500' : krpcStatus === 'connecting' ? 'bg-amber-500 animate-pulse' : 'bg-slate-600'}`}></span>
                            <span className="text-[10px] text-slate-400 font-bold uppercase w-20">kRPC</span>
                            <input type="text" value={krpcAddress} onChange={(e) => setKrpcAddress(e.target.value)} disabled={isLiveConnected} className="w-full bg-slate-800 border border-slate-600 rounded p-1.5 text-xs text-white focus:outline-none focus:border-indigo-500 font-mono disabled:opacity-50" placeholder="ws://IP:50000" />
                          </div>
                        </div>
                      )}
                    </div>

                    <button 
                      onClick={handleConnectTelemetry}
                      className={`flex items-center justify-center gap-2 w-full md:w-auto px-6 py-4 md:py-3 rounded-lg font-bold transition-all ${isLiveConnected ? 'bg-red-500/10 text-red-400 border border-red-500/30 hover:bg-red-500/20' : 'bg-emerald-600 text-white hover:bg-emerald-500 shadow-lg shadow-emerald-600/20'}`}
                    >
                      {isLiveConnected ? <WifiOff className="w-5 h-5" /> : <Wifi className="w-5 h-5" />}
                      {isLiveConnected ? (
                        (telemachusStatus === 'error' && krpcStatus === 'error') ? 'Link Failed (Sever)' :
                        (telemachusStatus === 'error' || krpcStatus === 'error') ? 'Sever Partial Link' : 'Sever Link'
                      ) : 'Engage Link'}
                    </button>
                  </div>
                  
                  {connectionError && (
                    <div className="bg-red-900/20 border-b border-red-500/30 p-3 text-xs text-red-400 font-mono text-center flex items-center justify-center gap-2">
                      <AlertTriangle className="w-4 h-4 shrink-0" />
                      {connectionError}
                    </div>
                  )}
                </div>

                {isLiveConnected && (
                  <>
                    {pinnedModules.length > 0 && (
                      <div className="sticky top-0 z-40 bg-slate-950/95 backdrop-blur-xl shadow-2xl pt-2 pb-6 px-1 border-b border-slate-800/80 mb-6 mx-[-4px]">
                        <div className="grid grid-cols-1 lg:grid-cols-3 gap-4 items-start auto-rows-max">
                          {pinnedModules.map(mod => renderWidgetWrapper(mod))}
                        </div>
                      </div>
                    )}
                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-6 animate-in slide-in-from-bottom-4 duration-500 pb-12 items-start auto-rows-max">
                      {unpinnedModules.map(mod => renderWidgetWrapper(mod))}
                    </div>
                  </>
                )}
              </div>
            )}

            {/* TAB 3: AJUSTES (SETTINGS) */}
            {activeTab === 'settings' && (
              <div className="max-w-2xl mx-auto p-4 md:p-8 space-y-8 animate-in fade-in duration-300">
                <div className="bg-slate-800 rounded-xl border border-slate-700 shadow-xl overflow-hidden">
                  <div className="p-6 border-b border-slate-700 bg-slate-800/80">
                    <h2 className="text-xl font-bold text-white flex items-center gap-2">
                      <Activity className="w-5 h-5 text-emerald-400" /> Live Manager Layout
                    </h2>
                    <p className="text-slate-400 text-sm mt-1">Enable, resize, and rearrange the telemetry modules on your flight computer.</p>
                  </div>
                  <div className="p-4 space-y-3">
                    {liveModules.map((mod, index) => {
                      const def = WIDGET_DEFS[mod.id];
                      const Icon = def.icon;
                      return (
                        <div key={mod.id} className="flex flex-col sm:flex-row sm:items-center justify-between p-4 bg-slate-900 border border-slate-700 rounded-lg gap-4">
                          <div className="flex items-center gap-3">
                            <Icon className="w-5 h-5 text-slate-500" />
                            <div>
                              <p className="font-bold text-slate-200">{def.title}</p>
                              <p className="text-xs text-slate-500">Status: {mod.enabled ? 'Enabled' : 'Disabled'} • {mod.pinned ? 'Pinned' : 'Unpinned'}</p>
                            </div>
                          </div>
                          <div className="flex items-center gap-2">
                            {/* Up / Down Arrows for Rearranging */}
                            <div className="flex gap-1 mr-2 bg-slate-800 p-1 rounded border border-slate-700">
                              <button onClick={() => moveModule(index, 'up')} disabled={index === 0} className="p-1 text-slate-400 hover:text-white disabled:opacity-30"><ArrowUp className="w-4 h-4"/></button>
                              <button onClick={() => moveModule(index, 'down')} disabled={index === liveModules.length - 1} className="p-1 text-slate-400 hover:text-white disabled:opacity-30"><ArrowDown className="w-4 h-4"/></button>
                            </div>

                            {/* Size Toggle (Desktop) */}
                            <button 
                              onClick={() => updateModule(mod.id, { size: mod.size === 'full' ? 'half' : 'full' })} 
                              className={`p-2 rounded border transition-colors hidden sm:block ${mod.size === 'full' ? 'bg-indigo-900/50 border-indigo-500/50 text-indigo-300' : 'bg-slate-800 border-slate-600 text-slate-400 hover:bg-slate-700'}`}
                              title="Toggle Desktop Width"
                            >
                              {mod.size === 'full' ? <Minimize2 className="w-4 h-4"/> : <Maximize2 className="w-4 h-4"/>}
                            </button>

                            {/* Visibility Toggle */}
                            <button 
                              onClick={() => updateModule(mod.id, { enabled: !mod.enabled })} 
                              className={`p-2 rounded border transition-colors ${mod.enabled ? 'bg-emerald-900/50 border-emerald-500/50 text-emerald-400' : 'bg-slate-800 border-slate-600 text-slate-500 hover:bg-slate-700'}`}
                              title="Toggle Visibility"
                            >
                              {mod.enabled ? <Eye className="w-4 h-4"/> : <EyeOff className="w-4 h-4"/>}
                            </button>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </div>
              </div>
            )}

          </div>
        </div>
      );
    }

    // Mount the Application
    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
