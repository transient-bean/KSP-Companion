<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KSP Companion</title>
  
  <!-- Load Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Custom Styles for Scrollbars -->
  <style>
    .custom-scrollbar::-webkit-scrollbar { height: 6px; width: 6px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: rgba(15, 23, 42, 0.5); }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(71, 85, 105, 0.8); border-radius: 10px; }
    body { background-color: #020617; color: #f1f5f9; }
  </style>

  <!-- Import Maps for React and Lucide Icons -->
  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.292.0"
      }
    }
  </script>
</head>
<body class="h-screen w-full overflow-hidden">
  <div id="root" class="h-full w-full"></div>

  <!-- Load Babel to compile JSX in the browser automatically -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- The Main React Application -->
  <script type="text/babel" data-type="module">
    import React, { useState, useEffect, useRef } from 'react';
    import { createRoot } from 'react-dom/client';
    import { Rocket, Plus, Trash2, Map, Activity, Sliders, Cpu, Zap, Droplet, ChevronDown, ChevronUp, X, BookOpen, Layers, Orbit, Compass, Clock, HelpCircle, Wifi, WifiOff, Gauge, Database, Crosshair, Power, Sun, MoveDown, AlertTriangle, ArrowUpToLine, Flame, Pin, Settings as SettingsIcon, ArrowUp, ArrowDown, Eye, EyeOff, Maximize2, Minimize2, ThermometerSun, Wind, Server } from 'lucide-react';

    const baseHardware = {
      launch: { battery: '100-200 (For launch duration)', monoprop: '0', generation: 'Alternator power' },
      transfer: { battery: 'Minimal', monoprop: '0', generation: 'Relies on CSM' },
      capture: { battery: '400+', monoprop: '20-40 (For transposition)', generation: 'Deployable Solar Panels' },
      landing: { battery: '200+', monoprop: '0', generation: 'Static panels or small battery' },
      ascent: { battery: '100+', monoprop: '40-70 (For rendezvous)', generation: 'None' },
      return: { battery: '150 (Pod battery)', monoprop: '0', generation: 'None (Disconnect pod prior)' }
    };

    const driftTax = 91; 

    const destRaw = {
      Mun: { inc: 0 + driftTax, tr: 860, cap: 310, lnd: 909, asc: 636, ret: 310 }, 
      Minmus: { inc: 340 + driftTax, tr: 930, cap: 160, lnd: 180, asc: 180, ret: 160 },
      Moho: { inc: 2520 + driftTax, tr: 1690, cap: 2410, lnd: 870, asc: 870, ret: 2410 },
      Eve: { inc: 430 + driftTax, tr: 1050, cap: 1330, lnd: 80, asc: 8000, ret: 1330 },
      Gilly: { inc: 430 + driftTax, tr: 1050, cap: 2150, lnd: 30, asc: 30, ret: 2150 },
      Duna: { inc: 10 + driftTax, tr: 1040, cap: 610, lnd: 250, asc: 1450, ret: 610 }, 
      Ike: { inc: 10 + driftTax, tr: 1040, cap: 670, lnd: 390, asc: 390, ret: 670 },
      Dres: { inc: 1010 + driftTax, tr: 1520, cap: 1290, lnd: 430, asc: 430, ret: 1290 },
      Jool: { inc: 270 + driftTax, tr: 1910, cap: 2810, lnd: 0, asc: 0, ret: 2810 }, 
      Laythe: { inc: 270 + driftTax, tr: 1910, cap: 4810, lnd: 100, asc: 2900, ret: 4810 },
      Vall: { inc: 270 + driftTax, tr: 1910, cap: 3730, lnd: 860, asc: 860, ret: 3730 },
      Tylo: { inc: 270 + driftTax, tr: 1910, cap: 3210, lnd: 2270, asc: 2270, ret: 3210 },
      Bop: { inc: 270 + driftTax, tr: 1910, cap: 5250, lnd: 220, asc: 220, ret: 5250 },
      Pol: { inc: 270 + driftTax, tr: 1910, cap: 3640, lnd: 130, asc: 130, ret: 3640 },
      Eeloo: { inc: 1330 + driftTax, tr: 2040, cap: 1370, lnd: 620, asc: 620, ret: 1370 }
    };

    const flightDynamics = {
      Mun: { phase: '~90°', eject: 'Prograde', retPhase: 'Any', retEject: 'Retrograde to Mun' },
      Minmus: { phase: '~90°', eject: 'Prograde', retPhase: 'Any', retEject: 'Retrograde to Minmus' },
      Moho: { phase: '108.2°', eject: '61.3°', retPhase: '-76.1°', retEject: '-94.2°' }, 
      Eve: { phase: '-54.1°', eject: '25.4°', retPhase: '-36.1°', retEject: '-162.8°' },
      Duna: { phase: '44.4°', eject: '-150.9°', retPhase: '75.2°', retEject: '58.9°' },
      Dres: { phase: '82.1°', eject: '-123.1°', retPhase: '-30.3°', retEject: '85.0°' },
      Jool: { phase: '96.6°', eject: '-114.4°', retPhase: '48.7°', retEject: '19.6°' },
      Eeloo: { phase: '101.4°', eject: '-111.8°', retPhase: '-80.3°', retEject: '85.8°' },
      Gilly: { phase: '-54.1°', eject: '25.4°', retPhase: '-36.1°', retEject: '-162.8°' },
      Ike: { phase: '44.4°', eject: '-150.9°', retPhase: '75.2°', retEject: '58.9°' },
      Laythe: { phase: '96.6°', eject: '-114.4°', retPhase: '48.7°', retEject: '19.6°' },
      Vall: { phase: '96.6°', eject: '-114.4°', retPhase: '48.7°', retEject: '19.6°' },
      Tylo: { phase: '96.6°', eject: '-114.4°', retPhase: '48.7°', retEject: '19.6°' },
      Bop: { phase: '96.6°', eject: '-114.4°', retPhase: '48.7°', retEject: '19.6°' },
      Pol: { phase: '96.6°', eject: '-114.4°', retPhase: '48.7°', retEject: '19.6°' }
    };

    const glossary = {
      'Transfer Window': 'The date you launch off Kerbin. The planets must be aligned perfectly (the Phase Angle) before you leave the launchpad. If you ignore this, you will completely miss the target planet.',
      'Ejection Angle': 'The exact location in your Kerbin parking orbit where you need to ignite your engines for the transfer burn. (e.g. For the Mun, this is the 6 o\'clock position).',
      'Return Window': 'Just like getting there, you have to wait for the planets to align again before you can fly home. If you leave early, you will be stranded in solar orbit.',
      'Return Ejection': 'Where to place your maneuver node around your target planet to drop back down to Kerbin.',
      'Global Margin': 'A universal safety net of extra fuel. Humans cannot fly mathematically perfect trajectories; you will always waste fuel fighting gravity or turning too slowly. 10% is standard.',
      'Stage Boost': 'An isolated safety margin just for this stage. Perfect for things like the Lander, where you know you will waste fuel hovering to look for a flat spot to touch down.',
      'Delta-v (Δv)': 'Literally "Change in Velocity". This is your rocket\'s true range or "fuel budget". Instead of measuring fuel in gallons, aerospace engineers measure how much a ship can change its speed in a vacuum (meters per second).'
    };

    const initialDestinations = Object.entries(destRaw).reduce((acc, [name, data]) => {
      acc[name] = {
        maneuvers: [
          { id: 'launch', name: 'Launch to LKO', dv: 3400, description: 'Pushing out of Kerbin\'s thick atmosphere into a stable 85km parking orbit.', rec: baseHardware.launch },
          { id: 'inclination', name: 'Course & Plane Correction', dv: data.inc, description: `Contains a base 100m/s budget for launch drift, plus any specific inclination (tilt) changes required to match ${name}'s orbital plane.`, rec: baseHardware.transfer },
          { id: 'transfer', name: `${name} Transfer Burn`, dv: data.tr, description: `The massive deep-space injection burn from Low Kerbin Orbit out to ${name}.`, rec: baseHardware.transfer },
          { id: 'csm_capture', name: `${name} Capture`, dv: data.cap, description: `A hard braking burn to slow down and establish a parking orbit around ${name}.`, rec: baseHardware.capture },
          { id: 'landing', name: `${name} Landing`, dv: data.lnd, description: data.lnd === 0 ? 'Gas Giant (No solid surface).' : `Powered descent from orbit down to the surface of ${name}.`, rec: baseHardware.landing },
          { id: 'ascent', name: `${name} Ascent`, dv: data.asc, description: data.asc === 0 ? 'No ascent possible.' : `Blasting off the surface back into a stable ${name} orbit.`, rec: baseHardware.ascent },
          { id: 'csm_return', name: 'Return to Kerbin', dv: data.ret, description: `The final escape burn to leave ${name} and drop your periapsis directly into Kerbin's atmosphere for a skipping re-entry.`, rec: baseHardware.return }
        ]
      };
      return acc;
    }, {});

    const getManeuverEstimates = (target) => {
      const hasAtmosphere = ['Eve', 'Duna', 'Jool', 'Laythe'].includes(target);
      const hasOxygen = ['Laythe'].includes(target);
      const hasSurface = target !== 'Jool';
      const isEve = target === 'Eve';
      const isHighGravity = ['Tylo', 'Moho', 'Vall', 'Eeloo'].includes(target);
      
      const estimates = [];

      let ascents = [];
      if (isEve) {
        ascents.push({ name: 'Eve Sea-Level Ascent', dv: 8000, desc: 'Brutal ascent from Eve ocean level through incredibly thick atmosphere.' });
        ascents.push({ name: 'Eve Peak Ascent', dv: 6000, desc: 'Ascent from Eve highest mountain peak to save massive drag.' });
      } else if (hasAtmosphere && hasSurface) {
        ascents.push({ name: 'Aerodynamic Ascent', dv: destRaw[target].asc, desc: `Slicing through ${target}'s atmosphere to reach orbit.` });
      }
      if (hasOxygen) {
        ascents.push({ name: 'SSTO Jet Climb', dv: 0, desc: 'Atmospheric flight using jet engines. Costs liquid fuel, not rocket Δv.' });
        ascents.push({ name: 'SSTO Rocket Kick', dv: destRaw[target].asc * 0.8, desc: 'Closed-cycle burn to push an SSTO into stable orbit.' });
      }
      if (ascents.length > 0) estimates.push({ category: 'Atmospheric Ascents', items: ascents });

      let descents = [];
      if (hasAtmosphere) {
        descents.push({ name: 'Aerocapture / Aerobraking', dv: 20, desc: 'Dipping into the atmosphere to use air friction to slow down for free.' });
        if (hasSurface) {
          descents.push({ name: 'Parachute-Assisted Landing', dv: 50, desc: 'Using chutes for 95% of the braking, firing engines just before hitting the dirt.' });
        }
      }
      if (hasSurface) {
        descents.push({ name: isHighGravity ? 'High-G Suicide Burn' : 'Powered Landing', dv: destRaw[target].lnd, desc: 'A terrifying, maximum-throttle braking maneuver starting at the absolute last possible second before impact. Extremely efficient, but zero margin for error.' });
        descents.push({ name: 'Lithobraking', dv: 0, desc: 'An aerospace joke term meaning "using the ground to stop." (Crashing).' });
      }
      estimates.push({ category: 'Descent & Landings', items: descents });

      estimates.push({ category: 'Orbital Operations', items: [
        { name: 'Rendezvous Phasing', dv: 100, desc: 'Small orbital adjustments to catch up to a target ship and match speeds.' },
        { name: 'Major Plane Change', dv: 300, desc: 'A massive inclination (tilt) shift close to a planet.' },
        { name: `Deorbit Burn (${target})`, dv: hasAtmosphere ? 50 : 150, desc: 'Dropping your periapsis out of orbit to intersect the surface.' },
        { name: 'Station Keeping', dv: 15, desc: 'Micro-adjustments using RCS thrusters to dock.' }
      ]});

      estimates.push({ category: 'Deep Space & Networks', items: [
        { name: 'Mid-Course Correction', dv: 50, desc: 'A tiny puff of the engine made halfway to a destination to perfectly align your arrival altitude.' },
        { name: 'Relay Resonance Burn', dv: 150, desc: 'Changing your orbital period to perfectly space out a triangle of communication satellites.' },
        { name: 'Gravity Assist Slingshot', dv: 150, desc: 'A highly complex burn deep in a gravity well to steal momentum from a moon and sling yourself into deep space.' }
      ]});

      return estimates;
    };

    const missionTemplates = {
      apollo: { name: 'Apollo-Style Landing', desc: 'Classic two-ship architecture: command module in orbit, dedicated lander to surface.', stages: [{ name: 'Launch Vehicle', assignedManeuvers: ['launch'], localMargin: 0 }, { name: 'Transfer Stage', assignedManeuvers: ['inclination', 'transfer'], localMargin: 0 }, { name: 'Main Ship (CSM)', assignedManeuvers: ['csm_capture', 'csm_return'], localMargin: 0 }, { name: 'Descent Module', assignedManeuvers: ['landing'], localMargin: 0 }, { name: 'Ascent Module', assignedManeuvers: ['ascent'], localMargin: 0 }] },
      direct: { name: 'Direct Ascent Landing', desc: 'One massive ship that launches, lands, and returns with no orbital docking.', stages: [{ name: 'Launch Vehicle', assignedManeuvers: ['launch'], localMargin: 0 }, { name: 'Transfer Stage', assignedManeuvers: ['inclination', 'transfer'], localMargin: 0 }, { name: 'Lander Core', assignedManeuvers: ['csm_capture', 'landing', 'ascent', 'csm_return'], localMargin: 5 }] },
      probe: { name: 'Surface Probe / Rover', desc: 'One-way trip to drop robotic hardware onto the surface.', stages: [{ name: 'Launch Vehicle', assignedManeuvers: ['launch'], localMargin: 0 }, { name: 'Transfer Stage', assignedManeuvers: ['inclination', 'transfer'], localMargin: 0 }, { name: 'Skycrane / Braking', assignedManeuvers: ['csm_capture', 'landing'], localMargin: 0 }] },
      survey: { name: 'Polar Survey Satellite', desc: 'Place a scanning satellite into a high-inclination polar orbit.', injections: [{ id: 'custom_polar', name: 'Polar Injection Burn', dv: 250, description: 'Shift inclination 90 degrees to cross over the poles.', rec: { battery: '400', monoprop: '0', generation: 'Solar' } }], stages: [{ name: 'Launch Vehicle', assignedManeuvers: ['launch'], localMargin: 0 }, { name: 'Transfer Stage', assignedManeuvers: ['inclination', 'transfer'], localMargin: 0 }, { name: 'Orbital Probe', assignedManeuvers: ['csm_capture', 'custom_polar'], localMargin: 0 }] },
      relay: { name: 'Relay Network Triad', desc: 'Deploy 3 comms satellites into a mathematically perfect resonant orbit.', injections: [{ id: 'custom_resonance', name: 'Resonance Spacing Burn', dv: 150, description: 'Change orbital period by 2/3rds to deploy satellites 120 degrees apart.', rec: { battery: '100', monoprop: '0', generation: 'Solar' } }], stages: [{ name: 'Launch Vehicle', assignedManeuvers: ['launch'], localMargin: 0 }, { name: 'Transfer Stage', assignedManeuvers: ['inclination', 'transfer'], localMargin: 0 }, { name: 'Satellite Bus', assignedManeuvers: ['csm_capture', 'custom_resonance'], localMargin: 0 }] },
      station: { name: 'Orbital Space Station', desc: 'Haul heavy core modules or crew into orbit and rendezvous.', injections: [{ id: 'custom_phasing', name: 'Rendezvous Phasing', dv: 100, description: 'Catch up to and match velocity with the target station.', rec: { battery: '1000+', monoprop: '100', generation: 'Solar Arrays' } }], stages: [{ name: 'Heavy Lifter', assignedManeuvers: ['launch'], localMargin: 0 }, { name: 'Transfer & Phasing', assignedManeuvers: ['inclination', 'transfer', 'custom_phasing'], localMargin: 0 }, { name: 'Station Tug', assignedManeuvers: ['csm_capture'], localMargin: 0 }] },
      asteroid: { name: 'Asteroid Redirect', desc: 'Intercept a deep space rock and drag it back.', injections: [{ id: 'custom_intercept', name: 'Deep Space Intercept', dv: 350, description: 'Match planes and set an encounter with the asteroid.', rec: { battery: '1000', monoprop: '0', generation: 'RTG' } }, { id: 'custom_match', name: 'Match Velocity', dv: 200, description: 'Brake to a relative speed of 0m/s next to the asteroid.', rec: { battery: 'Varies', monoprop: '150+', generation: 'RTG' } }, { id: 'custom_redirect', name: 'Asteroid Redirect Burn', dv: 800, description: 'Hauling the rock. Delta-v varies wildly based on asteroid class.', rec: { battery: 'Varies', monoprop: '0', generation: 'RTG' } }], stages: [{ name: 'Heavy Lifter', assignedManeuvers: ['launch'], localMargin: 0 }, { name: 'Deep Space Tug', assignedManeuvers: ['inclination', 'custom_intercept', 'custom_match', 'custom_redirect', 'csm_return'], localMargin: 15 }] }
    };

    const asteroidDvMap = { 'A (Tiny, ~10t)': 250, 'B (Small, ~40t)': 400, 'C (Medium, ~150t)': 800, 'D (Large, ~500t)': 2200, 'E (Massive, ~2500t+)': 8500 };

    const WIDGET_DEFS = {
      'dv': { title: 'Delta-V', icon: ArrowUpToLine },
      'resources': { title: 'Resources', icon: Database },
      'grid': { title: 'Telemetry', icon: Compass },
      'controls': { title: 'Controls', icon: Rocket },
      'actions': { title: 'Actions', icon: Power }
    };

    const AutoScrollTicker = ({ items }) => {
      const scrollRef = useRef(null);
      const contentRef = useRef(null);
      const [isInteracting, setIsInteracting] = useState(false);

      useEffect(() => {
        if (!scrollRef.current || !contentRef.current || isInteracting) return;
        let animationId;
        const scrollElem = scrollRef.current;
        const contentElem = contentRef.current;
        const step = () => {
          const singleSetWidth = contentElem.scrollWidth / 2;
          scrollElem.scrollLeft += 0.5; 
          if (scrollElem.scrollLeft >= singleSetWidth) {
            scrollElem.scrollLeft -= singleSetWidth; 
          }
          animationId = requestAnimationFrame(step);
        };
        animationId = requestAnimationFrame(step);
        return () => cancelAnimationFrame(animationId);
      }, [isInteracting, items]);

      return (
        <div 
          ref={scrollRef}
          className="flex items-center overflow-x-auto custom-scrollbar flex-1 min-w-0 ml-2 pl-3 border-l border-white/10 relative"
          style={{ scrollBehavior: 'auto' }}
          onMouseEnter={() => setIsInteracting(true)}
          onMouseLeave={() => setIsInteracting(false)}
          onTouchStart={() => setIsInteracting(true)}
          onTouchEnd={() => setIsInteracting(false)}
        >
          <div ref={contentRef} className="flex gap-4 w-max pr-4">
            {[...items, ...items].map((item, i) => (
              <div key={i} className="flex items-center gap-1.5 shrink-0 whitespace-nowrap">
                {item.label && <span className={`text-[9px] font-bold uppercase tracking-widest ${item.color || 'text-white/50'}`}>{item.label}:</span>}
                <span className={`text-xs font-mono font-bold ${item.color || 'text-white/80'}`}>{item.val}</span>
              </div>
            ))}
          </div>
        </div>
      );
    };

    function App() {
      const [activeTab, setActiveTab] = useState('telemetry'); 
      const [selectedTarget, setSelectedTarget] = useState('Mun');
      const [globalMargin, setGlobalMargin] = useState(10);
      const [expandedHardware, setExpandedHardware] = useState({});
      const [isTemplateMenuOpen, setIsTemplateMenuOpen] = useState(false);
      const [asteroidClass, setAsteroidClass] = useState('C (Medium, ~150t)');
      const [userManeuvers, setUserManeuvers] = useState(Object.keys(initialDestinations).reduce((acc, key) => ({ ...acc, [key]: [] }), {}));
      const [isAddingManeuver, setIsAddingManeuver] = useState(false);
      const [newManeuverName, setNewManeuverName] = useState('');
      const [newManeuverDv, setNewManeuverDv] = useState('');
      const [newManeuverDesc, setNewManeuverDesc] = useState('Custom user-defined maneuver.');
      const [customStages, setCustomStages] = useState(missionTemplates.apollo.stages.map((s, i) => ({ ...s, id: Date.now() + i })));
      
      const [infoModal, setInfoModal] = useState({ isOpen: false, title: '', content: '' });

      // --- Live Telemetry & Layout State ---
      const [connectionMode, setConnectionMode] = useState('mock'); 
      const [telemachusAddress, setTelemachusAddress] = useState('ws://127.0.0.1:8080/datalink');
      const [krpcAddress, setKrpcAddress] = useState('ws://127.0.0.1:50000');
      const telemachusWsRef = useRef(null);
      const krpcWsRef = useRef(null);
      
      const [isLiveConnected, setIsLiveConnected] = useState(false);
      const [telemachusStatus, setTelemachusStatus] = useState('disconnected'); 
      const [krpcStatus, setKrpcStatus] = useState('disconnected');
      
      const [connectionError, setConnectionError] = useState('');
      const [systems, setSystems] = useState({ sas: false, rcs: false, lights: false, gear: true, brakes: true, custom1: false, custom2: false });
      const [telemetryModes, setTelemetryModes] = useState({ altitude: 'seaLevel', velocity: 'surface' });
      
      const [liveModules, setLiveModules] = useState([
        { id: 'dv', enabled: true, size: 'full', pinned: false, collapsed: false },
        { id: 'resources', enabled: true, size: 'full', pinned: false, collapsed: false },
        { id: 'grid', enabled: true, size: 'full', pinned: false, collapsed: false },
        { id: 'controls', enabled: true, size: 'half', pinned: false, collapsed: false },
        { id: 'actions', enabled: true, size: 'half', pinned: false, collapsed: false }
      ]);

      const [liveData, setLiveData] = useState({
        altitudeSeaLevel: 0, altitudeSurface: 0, velocityOrbital: 0, velocitySurface: 0, velocityTarget: 0, 
        apoapsis: 0, periapsis: 0, inclination: 0, eccentricity: 0, totalDv: 0, stageDv: 0, 
        body: 'Kerbin', phaseAngle: 0, throttle: 0, twr: 0, gForce: 1,
        q: 0, temp: 15,
        resLF: { current: 0, max: 100 }, resEC: { current: 0, max: 100 }, resMono: { current: 0, max: 100 }
      });

      useEffect(() => {
        let interval;
        if (isLiveConnected) {
          if (connectionMode === 'mock') {
            interval = setInterval(() => {
              setLiveData(prev => {
                const throttleDrain = prev.throttle > 0 ? (prev.throttle / 100) * 0.5 : 0;
                const velOrb = Math.floor(prev.velocityOrbital + (prev.throttle > 0 ? 20 : -5));
                const velSurf = Math.max(0, velOrb - 175);
                const altSL = Math.floor(prev.altitudeSeaLevel + (velSurf * 0.1) + (prev.throttle > 0 ? 50 : -20));
                const altSurf = Math.max(0, altSL - 120);
                const velTgt = Math.abs(velOrb - 2200);

                const atmosphericDensity = Math.max(0, 1 - (altSL / 70000));
                const mockQ = atmosphericDensity * Math.pow(velSurf / 100, 2) * 5; 
                const mockTemp = 15 + (atmosphericDensity * Math.pow(velSurf / 100, 2) * 40);

                return {
                  ...prev,
                  altitudeSeaLevel: altSL, altitudeSurface: altSurf,
                  velocityOrbital: velOrb, velocitySurface: velSurf, velocityTarget: velTgt,
                  apoapsis: Math.floor(prev.apoapsis + (prev.throttle > 0 ? 150 : 0)),
                  periapsis: Math.floor(prev.periapsis + (prev.throttle > 0 ? 100 : 0)),
                  inclination: Number(prev.inclination) + Math.random() * 0.05,
                  eccentricity: Math.max(0, Number(prev.eccentricity) + (Math.random() * 0.01 - 0.005)),
                  totalDv: Math.max(0, prev.totalDv - (prev.throttle > 0 ? 2 : 0)),
                  stageDv: Math.max(0, prev.stageDv - (prev.throttle > 0 ? 2 : 0)),
                  twr: prev.throttle > 0 ? (1.5 + Math.random() * 0.2) : 0,
                  gForce: prev.throttle > 0 ? (1.5 + Math.random() * 0.5) : (altSL < 70000 ? 1.0 : 0),
                  q: mockQ, temp: mockTemp,
                  resLF: { ...prev.resLF, current: Math.max(0, prev.resLF.current - throttleDrain) },
                  resEC: { ...prev.resEC, current: Math.min(prev.resEC.max, prev.resEC.current + (prev.throttle > 0 ? 0.2 : -0.05)) },
                  resMono: { ...prev.resMono, current: systems.rcs ? Math.max(0, prev.resMono.current - 0.1) : prev.resMono.current },
                  phaseAngle: Number(prev.phaseAngle) + 0.5 > 180 ? -180 : Number(prev.phaseAngle) + 0.5
                };
              });
            }, 500);
          } else if (connectionMode === 'live') {
            interval = setInterval(() => {
              if (telemachusWsRef.current && telemachusWsRef.current.readyState === WebSocket.OPEN) {
                telemachusWsRef.current.send(JSON.stringify({
                  "+": [
                    "v.altitude", "v.heightFromTerrain", "v.orbitalVelocity", "v.surfaceVelocity",
                    "o.ApA", "o.PeA", "o.inclination", "o.eccentricity",
                    "v.body", "f.throttle", "v.geeForce", "v.dynamicPressure",
                    "r.resource[LiquidFuel]", "r.resourceMax[LiquidFuel]",
                    "r.resource[ElectricCharge]", "r.resourceMax[ElectricCharge]",
                    "r.resource[MonoPropellant]", "r.resourceMax[MonoPropellant]"
                  ]
                }));
              }
            }, 500);
          }
        }
        return () => clearInterval(interval);
      }, [isLiveConnected, connectionMode, systems.rcs]);

      const handleConnectTelemetry = () => {
        if (isLiveConnected) {
          if (telemachusWsRef.current) { telemachusWsRef.current.close(); telemachusWsRef.current = null; }
          if (krpcWsRef.current) { krpcWsRef.current.close(); krpcWsRef.current = null; }
          setIsLiveConnected(false);
          setTelemachusStatus('disconnected');
          setKrpcStatus('disconnected');
          setConnectionError('');
        } else {
          if (connectionMode === 'mock') {
            setIsLiveConnected(true);
            setConnectionError('');
            setLiveData({ 
              altitudeSeaLevel: 75, altitudeSurface: 4, velocityOrbital: 175, velocitySurface: 0, velocityTarget: 2200,
              apoapsis: 75, periapsis: -600000, inclination: 0.05, eccentricity: 1.0, 
              totalDv: 6520, stageDv: 3400, body: 'Kerbin', phaseAngle: -15.4, throttle: 0, twr: 0, gForce: 1,
              q: 0, temp: 15,
              resLF: { current: 1440, max: 1440 }, resEC: { current: 200, max: 200 }, resMono: { current: 50, max: 50 }
            });
          } else {
            if (window.location.protocol === 'https:' && (telemachusAddress.startsWith('ws://') || krpcAddress.startsWith('ws://'))) {
              setConnectionError("CANVAS SECURITY BLOCK: Your browser is blocking this secure (https) site from talking to your unencrypted local game. To bypass the 'candado': Click the Settings/Lock icon next to your URL bar -> Site Settings -> 'Insecure Content' -> Change to ALLOW. Then reload the page.");
              return;
            }

            setIsLiveConnected(true);
            setTelemachusStatus('connecting');
            setKrpcStatus('connecting');
            setConnectionError('');

            try {
              const tWs = new WebSocket(telemachusAddress);
              tWs.onopen = () => setTelemachusStatus('connected');
              tWs.onmessage = (event) => {
                try {
                  const data = typeof event.data === 'string' ? JSON.parse(event.data) : null;
                  if (data) {
                    setLiveData(prev => ({
                      ...prev,
                      altitudeSeaLevel: data["v.altitude"] || prev.altitudeSeaLevel,
                      altitudeSurface: data["v.heightFromTerrain"] || prev.altitudeSurface,
                      velocityOrbital: data["v.orbitalVelocity"] || prev.velocityOrbital,
                      velocitySurface: data["v.surfaceVelocity"] || prev.velocitySurface,
                      apoapsis: data["o.ApA"] || prev.apoapsis,
                      periapsis: data["o.PeA"] || prev.periapsis,
                      inclination: data["o.inclination"] || prev.inclination,
                      eccentricity: data["o.eccentricity"] || prev.eccentricity,
                      body: data["v.body"] || prev.body,
                      throttle: data["f.throttle"] !== undefined ? Math.round(data["f.throttle"] * 100) : prev.throttle,
                      gForce: data["v.geeForce"] || prev.gForce,
                      q: data["v.dynamicPressure"] || prev.q,
                      resLF: { current: data["r.resource[LiquidFuel]"] || prev.resLF.current, max: data["r.resourceMax[LiquidFuel]"] || prev.resLF.max },
                      resEC: { current: data["r.resource[ElectricCharge]"] || prev.resEC.current, max: data["r.resourceMax[ElectricCharge]"] || prev.resEC.max },
                      resMono: { current: data["r.resource[MonoPropellant]"] || prev.resMono.current, max: data["r.resourceMax[MonoPropellant]"] || prev.resMono.max }
                    }));
                  }
                } catch (err) {
                  console.error('Telemachus parse error:', err);
                }
              };
              tWs.onerror = () => setTelemachusStatus('error');
              tWs.onclose = () => setTelemachusStatus('disconnected');
              telemachusWsRef.current = tWs;
            } catch (err) {
              setTelemachusStatus('error');
            }

            try {
              const kWs = new WebSocket(krpcAddress);
              kWs.onopen = () => setKrpcStatus('connected');
              kWs.onmessage = (event) => {
                console.log("kRPC payload intercepted:", event.data);
              };
              kWs.onerror = () => setKrpcStatus('error');
              kWs.onclose = () => setKrpcStatus('disconnected');
              krpcWsRef.current = kWs;
            } catch (err) {
              setKrpcStatus('error');
            }
          }
        }
      };

      const toggleSystem = (sys) => { if (!isLiveConnected) return; setSystems(prev => ({ ...prev, [sys]: !prev[sys] })); };
      
      const handleThrottle = (val) => { 
        if (!isLiveConnected) return; 
        if (connectionMode === 'mock') {
          setLiveData(prev => ({ ...prev, throttle: val })); 
        } else if (telemachusWsRef.current && telemachusWsRef.current.readyState === WebSocket.OPEN) {
           telemachusWsRef.current.send(JSON.stringify({ "run": [`f.setThrottle[${val / 100}]`] }));
           setLiveData(prev => ({ ...prev, throttle: val })); 
        }
      };
      
      const handleStage = () => { 
        if (!isLiveConnected) return; 
        if (connectionMode === 'mock') {
          setLiveData(prev => ({ ...prev, stageDv: Math.floor(prev.totalDv * 0.4), resLF: { current: 720, max: 720 } })); 
        } else if (telemachusWsRef.current && telemachusWsRef.current.readyState === WebSocket.OPEN) {
          telemachusWsRef.current.send(JSON.stringify({ "run": ["f.stage"] }));
        }
      };

      const handleAbort = () => { 
        if (!isLiveConnected) return; 
        if (connectionMode === 'mock') {
          handleThrottle(0); setSystems(prev => ({ ...prev, sas: true, gear: false, brakes: false })); 
        } else if (telemachusWsRef.current && telemachusWsRef.current.readyState === WebSocket.OPEN) {
          telemachusWsRef.current.send(JSON.stringify({ "run": ["f.abort"] }));
        }
      };

      const toggleAltitudeMode = () => setTelemetryModes(prev => ({ ...prev, altitude: prev.altitude === 'seaLevel' ? 'surface' : 'seaLevel' }));
      const toggleVelocityMode = () => setTelemetryModes(prev => ({ ...prev, velocity: prev.velocity === 'surface' ? 'orbital' : prev.velocity === 'orbital' ? 'target' : 'surface' }));

      const updateModule = (id, updates) => setLiveModules(prev => prev.map(m => m.id === id ? { ...m, ...updates } : m));
      const moveModule = (index, direction) => {
        setLiveModules(prev => {
          const newArr = [...prev];
          if (direction === 'up' && index > 0) { [newArr[index - 1], newArr[index]] = [newArr[index], newArr[index - 1]]; } 
          else if (direction === 'down' && index < newArr.length - 1) { [newArr[index + 1], newArr[index]] = [newArr[index], newArr[index + 1]]; }
          return newArr;
        });
      };

      const targetData = initialDestinations[selectedTarget];
      const targetDynamics = flightDynamics[selectedTarget];
      const dynamicEstimates = getManeuverEstimates(selectedTarget);
      
      const allManeuvers = [...targetData.maneuvers, ...userManeuvers[selectedTarget]].map(m => {
        if (m.id === 'custom_redirect') return { ...m, dv: asteroidDvMap[asteroidClass], description: `Hauling a Class ${asteroidClass.charAt(0)} asteroid into a stable orbit.` };
        return m;
      });

      const hasAsteroidManeuver = allManeuvers.some(m => m.id === 'custom_redirect');
      const calculateDv = (baseDv, localM = 0) => Math.round(baseDv * (1 + ((globalMargin + localM) / 100)));

      const totalMissionDv = customStages.reduce((total, stage) => {
        const stageBaseDv = stage.assignedManeuvers.reduce((sum, mId) => { const maneuver = allManeuvers.find(m => m.id === mId); return sum + (maneuver ? maneuver.dv : 0); }, 0);
        return total + calculateDv(stageBaseDv, stage.localMargin);
      }, 0);

      const openInfo = (title, specificContent = null) => { setInfoModal({ isOpen: true, title: title, content: specificContent || glossary[title] || 'Information not found.' }); };
      const closeInfo = () => setInfoModal({ isOpen: false, title: '', content: '' });

      const handleApplyTemplate = (templateKey) => {
        const template = missionTemplates[templateKey];
        if (template.injections) {
          setUserManeuvers(prev => {
            const currentTargetManeuvers = prev[selectedTarget] || [];
            const newInjections = template.injections.filter(inj => !currentTargetManeuvers.some(m => m.id === inj.id));
            return { ...prev, [selectedTarget]: [...currentTargetManeuvers, ...newInjections] };
          });
        }
        const newStages = template.stages.map((stage, idx) => ({ ...stage, id: Date.now() + idx, assignedManeuvers: [...stage.assignedManeuvers] }));
        setCustomStages(newStages);
        setIsTemplateMenuOpen(false);
      };

      const handleAddStage = () => setCustomStages([...customStages, { id: Date.now(), name: `New Stage ${customStages.length + 1}`, assignedManeuvers: [], localMargin: 0 }]);
      const handleRemoveStage = (idToRemove) => { setCustomStages(customStages.filter(stage => stage.id !== idToRemove)); const newExpanded = { ...expandedHardware }; delete newExpanded[idToRemove]; setExpandedHardware(newExpanded); };
      const handleUpdateStageName = (id, newName) => setCustomStages(customStages.map(stage => stage.id === id ? { ...stage, name: newName } : stage));
      const handleUpdateLocalMargin = (id, newMargin) => setCustomStages(customStages.map(stage => stage.id === id ? { ...stage, localMargin: parseInt(newMargin) || 0 } : stage));
      
      const handleToggleManeuver = (stageId, maneuverId) => {
        setCustomStages(customStages.map(stage => {
          if (stage.id === stageId) {
            const hasManeuver = stage.assignedManeuvers.includes(maneuverId);
            return { ...stage, assignedManeuvers: hasManeuver ? stage.assignedManeuvers.filter(m => m !== maneuverId) : [...stage.assignedManeuvers, maneuverId] };
          }
          return stage;
        }));
      };

      const toggleHardware = (stageId) => setExpandedHardware(prev => ({ ...prev, [stageId]: !prev[stageId] }));
      const handleSelectPreset = (preset) => { setNewManeuverName(preset.name); setNewManeuverDv(preset.dv.toString()); setNewManeuverDesc(preset.desc); };
      const saveCustomManeuver = () => {
        if (!newManeuverName.trim() || newManeuverDv === '') return;
        const newManeuver = { id: `custom_${Date.now()}`, name: newManeuverName, dv: parseInt(newManeuverDv), description: newManeuverDesc, rec: { battery: 'Varies', monoprop: 'Varies', generation: 'Varies' } };
        setUserManeuvers(prev => ({ ...prev, [selectedTarget]: [...prev[selectedTarget], newManeuver] }));
        setNewManeuverName(''); setNewManeuverDv(''); setNewManeuverDesc('Custom user-defined maneuver.'); setIsAddingManeuver(false);
      };

      const getResourceColor = (current, max, type) => {
        const pct = current / max;
        if (type === 'LF') return pct > 0.2 ? 'bg-orange-500' : 'bg-red-500';
        if (type === 'EC') return pct > 0.2 ? 'bg-amber-400' : 'bg-red-500';
        if (type === 'MONO') return pct > 0.2 ? 'bg-emerald-400' : 'bg-red-500';
        return 'bg-indigo-500';
      };

      const getModuleSummary = (id) => {
        if (!isLiveConnected) return null;
        
        switch (id) {
          case 'dv': {
            return {
              items: [
                { label: 'Stage', val: `${liveData.stageDv.toLocaleString()} m/s` },
                { label: 'Total', val: `${liveData.totalDv.toLocaleString()} m/s` }
              ]
            };
          }
          case 'resources': {
            return {
              items: [
                { label: 'LF', val: `${Math.round((liveData.resLF.current / liveData.resLF.max) * 100)}%`, color: 'text-orange-400' },
                { label: 'EC', val: `${Math.round((liveData.resEC.current / liveData.resEC.max) * 100)}%`, color: 'text-amber-400' },
                { label: 'Mono', val: `${Math.round((liveData.resMono.current / liveData.resMono.max) * 100)}%`, color: 'text-emerald-400' }
              ]
            };
          }
          case 'grid': {
            const alt = telemetryModes.altitude === 'seaLevel' ? liveData.altitudeSeaLevel : liveData.altitudeSurface;
            const vel = telemetryModes.velocity === 'surface' ? liveData.velocitySurface : telemetryModes.velocity === 'orbital' ? liveData.velocityOrbital : liveData.velocityTarget;
            
            const targetStr = targetDynamics.phase;
            const currentPhase = liveData.phaseAngle;
            const isMoons = selectedTarget === 'Mun' || selectedTarget === 'Minmus';
            const targetNum = parseFloat(targetStr.replace(/[^0-9.-]/g, ''));
            const isAligned = isMoons ? true : Math.abs(targetNum - currentPhase) <= 3;

            const items = [
              { label: 'Alt', val: `${Math.floor(alt).toLocaleString()}m` },
              { label: 'Vel', val: `${Math.floor(vel).toLocaleString()}m/s` },
              { label: 'Ap', val: `${Math.floor(liveData.apoapsis).toLocaleString()}m` },
              { label: 'Pe', val: `${Math.floor(liveData.periapsis).toLocaleString()}m` }
            ];

            if (liveData.gForce > 3) items.push({ label: 'WARN', val: 'HIGH-G', color: 'text-red-400 font-black animate-pulse' });
            if (liveData.twr < 1 && liveData.altitudeSurface < 10000 && liveData.throttle > 0) items.push({ label: 'WARN', val: 'LOW TWR', color: 'text-red-400 font-black animate-pulse' });
            if (liveData.q > 20) items.push({ label: 'WARN', val: 'HIGH-Q', color: 'text-amber-400 font-black animate-pulse' });
            if (liveData.temp > 1200) items.push({ label: 'WARN', val: 'OVERHEAT', color: 'text-red-400 font-black animate-pulse' });
            
            items.push({ label: 'Window', val: isAligned ? 'OPEN' : 'CLOSED', color: 'text-white' });

            return {
              items: items,
              wrapperClass: isAligned ? 'bg-emerald-900 border-emerald-500' : 'bg-red-950 border-red-500',
              headerClass: isAligned ? 'border-b-emerald-500/50' : 'border-b-red-500/50'
            };
          }
          case 'controls': return null;
          case 'actions': return null;
          default: return null;
        }
      };

      const renderWidgetContent = (id) => {
        switch (id) {
          case 'dv': {
            return (
              <div className="flex justify-between items-end">
                <div>
                  <p className="text-[10px] font-bold text-slate-500 uppercase tracking-widest mb-1">Current Stage Δv</p>
                  <div className="flex items-baseline gap-2">
                    <span className="text-4xl font-mono font-bold text-white">{liveData.stageDv.toLocaleString()}</span>
                    <span className="text-slate-500 font-medium">m/s</span>
                  </div>
                </div>
                <div className="text-right">
                  <p className="text-[10px] font-bold text-slate-500 uppercase tracking-wider mb-1">Total Vessel Δv</p>
                  <p className="text-xl font-mono text-slate-300">{liveData.totalDv.toLocaleString()} <span className="text-xs text-slate-600">m/s</span></p>
                </div>
              </div>
            );
          }
          case 'resources': {
            return (
              <div className="space-y-4">
                <div>
                  <div className="flex justify-between text-xs font-bold mb-1"><span className="text-slate-300 flex items-center gap-1"><Flame className="w-3 h-3 text-orange-500"/> Liquid Fuel</span><span className="text-slate-400 font-mono">{Math.round(liveData.resLF.current)} / {Math.round(liveData.resLF.max)}</span></div>
                  <div className="h-2 w-full bg-slate-900 rounded-full overflow-hidden border border-slate-700"><div className={`h-full ${getResourceColor(liveData.resLF.current, liveData.resLF.max, 'LF')} transition-all duration-300`} style={{ width: `${(liveData.resLF.current / liveData.resLF.max) * 100}%` }}></div></div>
                </div>
                <div>
                  <div className="flex justify-between text-xs font-bold mb-1"><span className="text-slate-300 flex items-center gap-1"><Zap className="w-3 h-3 text-amber-400"/> Electric Charge</span><span className="text-slate-400 font-mono">{Math.round(liveData.resEC.current)} / {Math.round(liveData.resEC.max)}</span></div>
                  <div className="h-2 w-full bg-slate-900 rounded-full overflow-hidden border border-slate-700"><div className={`h-full ${getResourceColor(liveData.resEC.current, liveData.resEC.max, 'EC')} transition-all duration-300`} style={{ width: `${(liveData.resEC.current / liveData.resEC.max) * 100}%` }}></div></div>
                </div>
                <div>
                  <div className="flex justify-between text-xs font-bold mb-1"><span className="text-slate-300 flex items-center gap-1"><Droplet className="w-3 h-3 text-emerald-400"/> Monopropellant</span><span className="text-slate-400 font-mono">{Math.round(liveData.resMono.current)} / {Math.round(liveData.resMono.max)}</span></div>
                  <div className="h-2 w-full bg-slate-900 rounded-full overflow-hidden border border-slate-700"><div className={`h-full ${getResourceColor(liveData.resMono.current, liveData.resMono.max, 'MONO')} transition-all duration-300`} style={{ width: `${(liveData.resMono.current / liveData.resMono.max) * 100}%` }}></div></div>
                </div>
              </div>
            );
          }
          case 'grid': {
            const targetStr = targetDynamics.phase;
            const currentPhase = liveData.phaseAngle;
            const isMoons = selectedTarget === 'Mun' || selectedTarget === 'Minmus';
            
            const targetNum = parseFloat(targetStr.replace(/[^0-9.-]/g, ''));
            const isAligned = isMoons ? true : Math.abs(targetNum - currentPhase) <= 3;
            
            let diff = targetNum - currentPhase;
            if (diff < 0) diff += 360;
            const etaDays = Math.floor(diff);

            const gWarn = liveData.gForce > 3;
            const twrWarn = liveData.twr < 1 && liveData.altitudeSurface < 10000 && liveData.throttle > 0;
            const qWarn = liveData.q > 20;
            const tempWarn = liveData.temp > 1200;

            return (
              <div className="flex flex-col bg-slate-800 rounded-lg overflow-hidden">
                <div className="grid grid-cols-2 sm:grid-cols-4 gap-px bg-slate-700">
                  <div onClick={toggleAltitudeMode} className="bg-slate-800 p-4 cursor-pointer hover:bg-slate-700/80 transition-colors">
                    <div className="flex items-center justify-between mb-1"><p className="text-[10px] text-slate-500 uppercase tracking-widest font-bold">Alt ({telemetryModes.altitude === 'seaLevel' ? 'Sea' : 'Surf'})</p><span className="text-[8px] bg-slate-900 px-1.5 py-0.5 rounded text-slate-400">TAP</span></div>
                    <p className="text-xl font-mono font-medium text-amber-400">{Math.floor(telemetryModes.altitude === 'seaLevel' ? liveData.altitudeSeaLevel : liveData.altitudeSurface).toLocaleString()} <span className="text-xs text-slate-600 font-sans">m</span></p>
                  </div>
                  <div onClick={toggleVelocityMode} className="bg-slate-800 p-4 cursor-pointer hover:bg-slate-700/80 transition-colors">
                    <div className="flex items-center justify-between mb-1"><p className="text-[10px] text-slate-500 uppercase tracking-widest font-bold flex items-center gap-1"><Gauge className="w-3 h-3" /> Vel ({telemetryModes.velocity === 'surface' ? 'Surf' : telemetryModes.velocity === 'orbital' ? 'Orb' : 'Tgt'})</p><span className="text-[8px] bg-slate-900 px-1.5 py-0.5 rounded text-slate-400">TAP</span></div>
                    <p className="text-xl font-mono font-medium text-indigo-400">{Math.floor(telemetryModes.velocity === 'surface' ? liveData.velocitySurface : telemetryModes.velocity === 'orbital' ? liveData.velocityOrbital : liveData.velocityTarget).toLocaleString()} <span className="text-xs text-slate-600 font-sans">m/s</span></p>
                  </div>
                  <div className="bg-slate-800 p-4">
                    <p className="text-[10px] text-slate-500 uppercase tracking-widest font-bold mb-1 flex justify-between"><span>Apoapsis (Ap)</span> <span>Periapsis (Pe)</span></p>
                    <p className="text-lg font-mono text-slate-300 flex justify-between"><span>{Math.floor(liveData.apoapsis).toLocaleString()} <span className="text-xs text-slate-600 font-sans">m</span></span><span>{Math.floor(liveData.periapsis).toLocaleString()} <span className="text-xs text-slate-600 font-sans">m</span></span></p>
                  </div>
                  <div className="bg-slate-800 p-4">
                    <p className="text-[10px] text-slate-500 uppercase tracking-widest font-bold mb-1 flex justify-between"><span>Current Body</span> <span>Inclination / Ecc</span></p>
                    <p className="text-lg font-mono text-slate-300 flex justify-between"><span className="text-white tracking-wide">{liveData.body}</span><span>{Number(liveData.inclination).toFixed(2)}° <span className="text-slate-600">|</span> {Number(liveData.eccentricity).toFixed(3)}</span></p>
                  </div>

                  {/* Sensor Grid Row 2 */}
                  <div className={`p-4 transition-colors ${gWarn ? 'bg-red-900/40 border border-red-500' : 'bg-slate-800'}`}>
                    <p className="text-[10px] text-slate-500 uppercase tracking-widest font-bold mb-1 flex items-center gap-1">G-Force {gWarn && <AlertTriangle className="w-3 h-3 text-red-500 animate-pulse"/>}</p>
                    <p className={`text-xl font-mono font-medium ${gWarn ? 'text-red-400 font-black' : 'text-slate-300'}`}>{Number(liveData.gForce).toFixed(2)} <span className="text-xs font-sans">G</span></p>
                  </div>
                  <div className={`p-4 transition-colors ${twrWarn ? 'bg-red-900/40 border border-red-500' : 'bg-slate-800'}`}>
                    <p className="text-[10px] text-slate-500 uppercase tracking-widest font-bold mb-1 flex items-center gap-1">TWR {twrWarn && <AlertTriangle className="w-3 h-3 text-red-500 animate-pulse"/>}</p>
                    <p className={`text-xl font-mono font-medium ${twrWarn ? 'text-red-400 font-black' : 'text-emerald-400'}`}>{Number(liveData.twr).toFixed(2)}</p>
                  </div>
                  <div className={`p-4 transition-colors ${qWarn ? 'bg-amber-900/40 border border-amber-500' : 'bg-slate-800'}`}>
                    <p className="text-[10px] text-slate-500 uppercase tracking-widest font-bold mb-1 flex items-center gap-1"><Wind className="w-3 h-3" /> Dyn Pressure (Q)</p>
                    <p className={`text-xl font-mono font-medium ${qWarn ? 'text-amber-400 font-black animate-pulse' : 'text-slate-300'}`}>{Number(liveData.q).toFixed(1)} <span className="text-xs font-sans">kPa</span></p>
                  </div>
                  <div className={`p-4 transition-colors ${tempWarn ? 'bg-red-900/40 border border-red-500' : 'bg-slate-800'}`}>
                    <p className="text-[10px] text-slate-500 uppercase tracking-widest font-bold mb-1 flex items-center gap-1"><ThermometerSun className="w-3 h-3" /> Hull Temp</p>
                    <p className={`text-xl font-mono font-medium ${tempWarn ? 'text-red-400 font-black animate-pulse' : 'text-slate-300'}`}>{Number(liveData.temp).toFixed(0)} <span className="text-xs font-sans">°C</span></p>
                  </div>
                </div>
                
                <div className={`p-4 ${isAligned ? 'bg-emerald-900/20 border-t border-emerald-500/30' : 'bg-red-900/10 border-t border-red-500/20'} flex flex-col sm:flex-row items-center justify-between gap-4 transition-colors duration-500`}>
                  <div>
                    <p className="text-[10px] text-slate-500 uppercase tracking-widest font-bold mb-1 flex items-center gap-1"><Clock className="w-3 h-3" /> Phase Angle Tracker</p>
                    <div className="flex items-end gap-2">
                      <p className={`text-2xl font-mono font-bold ${isAligned ? 'text-emerald-400' : 'text-red-400'}`}>{Number(currentPhase).toFixed(1)}°</p>
                      <p className="text-sm font-mono text-slate-500 mb-1">/ {targetStr}</p>
                    </div>
                  </div>
                  <div className="text-left sm:text-right flex-1 border-t sm:border-t-0 sm:border-l border-slate-700/50 pt-2 sm:pt-0 sm:pl-4">
                     <p className="text-[10px] text-slate-500 uppercase tracking-widest font-bold mb-1">Estimated Time to Window</p>
                     <p className={`text-xl font-mono font-bold ${isAligned ? 'text-emerald-400' : 'text-slate-300'}`}>
                       {isMoons ? '0 Days (NOW)' : (isAligned ? '0 Days (NOW)' : `T-Minus ${etaDays} Days`)}
                     </p>
                  </div>
                  <div className={`px-4 py-2 rounded-lg border font-bold text-xs tracking-widest text-center w-full sm:w-auto shrink-0 ${isAligned ? 'bg-emerald-900/40 border-emerald-500/50 text-emerald-400' : 'bg-red-900/20 border-red-500/30 text-red-400/80'}`}>
                    {isMoons ? 'DEPARTURE WINDOW OPEN' : (isAligned ? 'WINDOW OPEN: LAUNCH' : 'WAITING FOR ALIGNMENT')}
                  </div>
                </div>
              </div>
            );
          }
          case 'controls': {
            return (
              <div className="space-y-4">
                <div className="bg-slate-900 p-3 rounded-lg border border-slate-700">
                  <div className="flex justify-between items-center mb-2"><span className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Main Throttle</span><span className="font-mono text-emerald-400 text-sm">{liveData.throttle}%</span></div>
                  <input type="range" min="0" max="100" step="1" value={liveData.throttle} onChange={(e) => handleThrottle(parseInt(e.target.value))} className="w-full h-2 bg-slate-800 rounded-lg appearance-none cursor-pointer accent-emerald-500 mb-3" />
                  <div className="flex gap-2"><button onClick={() => handleThrottle(0)} className="flex-1 bg-slate-800 hover:bg-slate-700 text-slate-300 text-xs py-1.5 rounded border border-slate-600 transition-colors">CUT</button><button onClick={() => handleThrottle(50)} className="flex-1 bg-slate-800 hover:bg-slate-700 text-slate-300 text-xs py-1.5 rounded border border-slate-600 transition-colors">50%</button><button onClick={() => handleThrottle(100)} className="flex-1 bg-emerald-900/50 hover:bg-emerald-800/50 text-emerald-300 text-xs py-1.5 rounded border border-emerald-500/50 transition-colors">MAX</button></div>
                </div>
                <div className="grid grid-cols-2 gap-3">
                  <button onClick={handleStage} className="col-span-2 bg-gradient-to-b from-orange-500 to-orange-700 hover:from-orange-400 hover:to-orange-600 text-white font-black tracking-widest text-lg py-4 rounded-lg border-b-4 border-orange-900 shadow-lg active:border-b-0 active:translate-y-1 transition-all">STAGE</button>
                  <button onClick={handleAbort} className="col-span-2 bg-red-900/40 hover:bg-red-800/60 text-red-400 border border-red-500/50 py-3 rounded-lg font-bold tracking-widest flex items-center justify-center gap-2 transition-colors"><AlertTriangle className="w-4 h-4" /> ABORT</button>
                </div>
              </div>
            );
          }
          case 'actions': {
            return (
              <div className="grid grid-cols-2 gap-3">
                <button onClick={() => toggleSystem('sas')} className={`flex flex-col items-center justify-center py-4 rounded-lg border-2 transition-all ${systems.sas ? 'bg-indigo-900/30 border-indigo-500 text-indigo-300 shadow-[0_0_15px_rgba(99,102,241,0.2)]' : 'bg-slate-900 border-slate-700 text-slate-500 hover:border-slate-500'}`}><Crosshair className={`w-6 h-6 mb-2 ${systems.sas ? 'text-indigo-400' : 'text-slate-600'}`} /><span className="font-bold tracking-wider text-xs">SAS</span></button>
                <button onClick={() => toggleSystem('rcs')} className={`flex flex-col items-center justify-center py-4 rounded-lg border-2 transition-all ${systems.rcs ? 'bg-emerald-900/30 border-emerald-500 text-emerald-300 shadow-[0_0_15px_rgba(16,185,129,0.2)]' : 'bg-slate-900 border-slate-700 text-slate-500 hover:border-slate-500'}`}><Activity className={`w-6 h-6 mb-2 ${systems.rcs ? 'text-emerald-400' : 'text-slate-600'}`} /><span className="font-bold tracking-wider text-xs">RCS</span></button>
                <button onClick={() => toggleSystem('lights')} className={`flex flex-col items-center justify-center py-3 rounded-lg border transition-all ${systems.lights ? 'bg-amber-900/30 border-amber-500 text-amber-300' : 'bg-slate-900 border-slate-700 text-slate-500'}`}><Sun className="w-5 h-5 mb-1" /><span className="font-bold tracking-wider text-[10px]">LIGHTS (U)</span></button>
                <button onClick={() => toggleSystem('gear')} className={`flex flex-col items-center justify-center py-3 rounded-lg border transition-all ${systems.gear ? 'bg-emerald-900/30 border-emerald-500 text-emerald-300' : 'bg-slate-900 border-slate-700 text-slate-500'}`}><MoveDown className="w-5 h-5 mb-1" /><span className="font-bold tracking-wider text-[10px]">GEAR (G)</span></button>
                <button onClick={() => toggleSystem('brakes')} className={`col-span-2 py-3 rounded-lg border transition-all font-bold tracking-wider text-xs ${systems.brakes ? 'bg-red-900/30 border-red-500 text-red-400 shadow-[0_0_10px_rgba(239,68,68,0.2)]' : 'bg-slate-900 border-slate-700 text-slate-500'}`}>BRAKES (B)</button>
                <div className="col-span-2 mt-2 pt-4 border-t border-slate-700">
                  <p className="text-[10px] text-slate-500 uppercase tracking-widest font-bold mb-3 text-center">Custom Array</p>
                  <div className="grid grid-cols-2 gap-2">
                    <button onClick={() => toggleSystem('custom1')} className={`py-2 rounded border text-xs font-bold transition-all ${systems.custom1 ? 'bg-indigo-600 border-indigo-400 text-white' : 'bg-slate-900 border-slate-600 text-slate-400 hover:bg-slate-800'}`}>[1] Solar Arrays</button>
                    <button onClick={() => toggleSystem('custom2')} className={`py-2 rounded border text-xs font-bold transition-all ${systems.custom2 ? 'bg-indigo-600 border-indigo-400 text-white' : 'bg-slate-900 border-slate-600 text-slate-400 hover:bg-slate-800'}`}>[2] Antennas</button>
                  </div>
                </div>
              </div>
            );
          }
          default: return null;
        }
      };

      const renderWidgetWrapper = (mod) => {
        if (!mod.enabled) return null;
        const def = WIDGET_DEFS[mod.id];
        const Icon = def.icon;
        const isNoPad = mod.id === 'grid';
        const spanClass = mod.size === 'full' ? 'lg:col-span-2' : 'lg:col-span-1';
        
        const summaryData = mod.collapsed ? getModuleSummary(mod.id) : null;
        const wrapperClass = (mod.collapsed && summaryData?.wrapperClass) ? summaryData.wrapperClass : 'bg-slate-800 border-slate-700';
        const headerClass = (mod.collapsed && summaryData?.headerClass) ? summaryData.headerClass : 'bg-slate-800/90 border-b-slate-700';
        const tickerItems = summaryData?.items || null;

        return (
          <div key={mod.id} className={`rounded-xl shadow-xl overflow-hidden transition-all duration-500 flex flex-col w-full h-fit border ${spanClass} ${wrapperClass}`}>
            <div className={`flex items-center justify-between p-3 border-b backdrop-blur transition-colors duration-500 ${headerClass}`}>
              
              <div className="flex items-center gap-2 cursor-pointer flex-1 min-w-0 pr-2" onClick={() => updateModule(mod.id, { collapsed: !mod.collapsed })}>
                <Icon className={`w-4 h-4 shrink-0 ${mod.collapsed && summaryData?.wrapperClass ? 'text-white' : 'text-emerald-400'}`} />
                <h3 className={`font-bold text-xs tracking-wider uppercase shrink-0 ${mod.collapsed && summaryData?.wrapperClass ? 'text-white' : 'text-slate-200'}`}>{def.title}</h3>
                
                {tickerItems && <AutoScrollTicker items={tickerItems} />}
              </div>

              <div className="flex items-center gap-1 shrink-0">
                <button onClick={() => updateModule(mod.id, { pinned: !mod.pinned })} className={`p-1.5 rounded-md transition-colors ${mod.pinned ? (mod.collapsed && summaryData?.wrapperClass ? 'bg-white/20 text-white' : 'bg-emerald-900/50 text-emerald-400') : (mod.collapsed && summaryData?.wrapperClass ? 'text-white/50 hover:text-white hover:bg-white/10' : 'text-slate-500 hover:text-white hover:bg-slate-700')}`} title={mod.pinned ? "Unpin" : "Pin to top"}>
                  <Pin className="w-3.5 h-3.5" />
                </button>
                <button onClick={() => updateModule(mod.id, { collapsed: !mod.collapsed })} className={`p-1.5 rounded-md transition-colors ${mod.collapsed && summaryData?.wrapperClass ? 'text-white/50 hover:text-white hover:bg-white/10' : 'text-slate-500 hover:text-white hover:bg-slate-700'}`}>
                  {mod.collapsed ? <ChevronDown className="w-4 h-4" /> : <ChevronUp className="w-4 h-4" />}
            </button>
              </div>
            </div>
            {!mod.collapsed && (
              <div className={isNoPad ? '' : 'p-5'}>
                {renderWidgetContent(mod.id)}
              </div>
            )}
          </div>
        );
      };

      const pinnedModules = liveModules.filter(m => m.pinned && m.enabled);
      const unpinnedModules = liveModules.filter(m => !m.pinned && m.enabled);

      return (
        <div className="h-full w-full bg-slate-950 text-slate-100 font-sans flex flex-col overflow-hidden relative">
          
          {infoModal.isOpen && (
            <div className="fixed inset-0 z-[200] flex items-center justify-center p-4">
              <div className="absolute inset-0 bg-slate-950/80 backdrop-blur-sm" onClick={closeInfo}></div>
              <div className="bg-slate-800 border border-slate-600 rounded-xl shadow-2xl z-10 w-full max-w-md overflow-hidden animate-in fade-in zoom-in-95 duration-200">
                <div className="flex justify-between items-center p-4 border-b border-slate-700 bg-slate-800/80">
                  <h3 className="font-bold text-lg text-indigo-300">{infoModal.title}</h3>
                  <button onClick={closeInfo} className="text-slate-400 hover:text-white transition-colors p-1"><X className="w-5 h-5" /></button>
                </div>
                <div className="p-5 text-slate-200 leading-relaxed text-sm md:text-base">{infoModal.content}</div>
                <div className="p-4 bg-slate-900/50 border-t border-slate-700 text-right">
                  <button onClick={closeInfo} className="bg-indigo-600 hover:bg-indigo-500 text-white px-6 py-2 rounded-lg font-medium transition-colors text-sm">Got it</button>
                </div>
              </div>
            </div>
          )}

          {/* App Header & Tab Navigation */}
          <div className="bg-slate-900 border-b border-slate-800 z-50 shrink-0">
            <div className="max-w-5xl mx-auto px-4 md:px-8 py-4 flex flex-col sm:flex-row sm:items-end justify-between gap-4">
              <div className="flex items-center gap-4">
                <div className="p-2.5 bg-indigo-600 rounded-lg shrink-0 shadow-lg shadow-indigo-600/20">
                  <Rocket className="w-6 h-6 text-white" />
                </div>
                <div>
                  <h1 className="text-2xl font-bold tracking-tight text-white">KSP Companion</h1>
                  <p className="text-xs text-slate-400 font-medium">AEROSPACE ARCHITECTURE & TELEMETRY</p>
                </div>
              </div>
              
              <div className="flex bg-slate-800 p-1 rounded-lg border border-slate-700 overflow-x-auto custom-scrollbar">
                <button onClick={() => setActiveTab('architect')} className={`whitespace-nowrap flex items-center gap-2 px-4 py-2 rounded-md text-sm font-medium transition-all ${activeTab === 'architect' ? 'bg-indigo-600 text-white shadow' : 'text-slate-400 hover:text-slate-200 hover:bg-slate-700/50'}`}>
                  <Map className="w-4 h-4" /> Mission Architect
                </button>
                <button onClick={() => setActiveTab('telemetry')} className={`whitespace-nowrap flex items-center gap-2 px-4 py-2 rounded-md text-sm font-medium transition-all ${activeTab === 'telemetry' ? 'bg-emerald-600 text-white shadow' : 'text-slate-400 hover:text-slate-200 hover:bg-slate-700/50'}`}>
                  <Activity className="w-4 h-4" /> Live Manager
                </button>
                <button onClick={() => setActiveTab('settings')} className={`whitespace-nowrap flex items-center gap-2 px-4 py-2 rounded-md text-sm font-medium transition-all ${activeTab === 'settings' ? 'bg-slate-600 text-white shadow' : 'text-slate-400 hover:text-slate-200 hover:bg-slate-700/50'}`}>
                  <SettingsIcon className="w-4 h-4" /> Ajustes
                </button>
              </div>
            </div>
          </div>

          {/* Main Content Area */}
          <div className="flex-1 overflow-y-auto relative custom-scrollbar">
            
            {/* TAB 1: MISSION ARCHITECT */}
            {activeTab === 'architect' && (
              <div className="max-w-5xl mx-auto p-4 md:p-8 space-y-8 animate-in fade-in duration-300">
                <div className="bg-slate-800 p-4 rounded-xl border border-slate-700 flex flex-col md:flex-row items-center justify-between gap-4 shadow-md">
                  <p className="text-slate-300 text-sm">Design your stages, calculate delta-v, and verify flight dynamics.</p>
                  <div className="w-full md:w-72 bg-slate-900 p-3 rounded-lg border border-slate-700/50">
                    <div className="flex justify-between items-center mb-2 text-sm text-slate-300">
                      <span className="flex items-center gap-1"><Sliders className="w-4 h-4 text-emerald-400" /> Global Margin <button onClick={() => openInfo('Global Margin')} className="text-slate-500 hover:text-indigo-400 transition-colors"><HelpCircle className="w-3.5 h-3.5" /></button></span>
                      <span className="font-mono font-bold text-emerald-400">+{globalMargin}%</span>
                    </div>
                    <input type="range" min="0" max="50" value={globalMargin} onChange={(e) => setGlobalMargin(parseInt(e.target.value))} className="w-full h-2 bg-slate-700 rounded-lg appearance-none cursor-pointer accent-emerald-500" />
                  </div>
                </div>

                <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                  <div className="space-y-6 lg:col-span-1">
                    <div className="bg-slate-800 rounded-xl p-6 border border-slate-700 shadow-xl sticky top-4">
                      <div className="flex items-center gap-2 mb-4 text-indigo-400">
                        <Map className="w-5 h-5" />
                        <h2 className="text-xl font-semibold text-white">Target Body</h2>
                      </div>
                      <div className="flex flex-wrap gap-2 mb-4 max-h-[200px] overflow-y-auto pr-1 custom-scrollbar">
                        {Object.keys(initialDestinations).map(target => (
                          <button key={target} onClick={() => setSelectedTarget(target)} className={`flex-grow py-2 px-3 rounded-md text-sm font-medium transition-colors ${selectedTarget === target ? 'bg-indigo-600 text-white shadow-md' : 'bg-slate-700 text-slate-300 hover:bg-slate-600'}`}>{target}</button>
                        ))}
                      </div>

                      <div className="bg-slate-900 rounded-lg p-4 mb-6 border border-slate-700">
                        <div className="flex items-center gap-2 mb-3 border-b border-slate-700 pb-2">
                          <Compass className="w-4 h-4 text-indigo-400" />
                          <h3 className="text-xs font-bold text-slate-300 uppercase tracking-wider">Flight Dynamics</h3>
                        </div>
                        <div className="grid grid-cols-2 gap-y-4 gap-x-2">
                          <div><p className="text-[10px] text-slate-400 uppercase tracking-wide flex items-center gap-1"><Clock className="w-3 h-3 text-slate-500"/> Transfer Window <button onClick={() => openInfo('Transfer Window')} className="text-slate-500 hover:text-indigo-400"><HelpCircle className="w-3 h-3" /></button></p><p className="text-sm font-mono text-emerald-400 mt-0.5">{targetDynamics.phase}</p></div>
                          <div><p className="text-[10px] text-slate-400 uppercase tracking-wide flex items-center gap-1">Ejection Angle <button onClick={() => openInfo('Ejection Angle')} className="text-slate-500 hover:text-indigo-400"><HelpCircle className="w-3 h-3" /></button></p><p className="text-sm font-mono text-emerald-400 mt-0.5">{targetDynamics.eject}</p></div>
                          <div><p className="text-[10px] text-slate-400 uppercase tracking-wide flex items-center gap-1"><Clock className="w-3 h-3 text-slate-500"/> Return Window <button onClick={() => openInfo('Return Window')} className="text-slate-500 hover:text-indigo-400"><HelpCircle className="w-3 h-3" /></button></p><p className="text-sm font-mono text-amber-400 mt-0.5">{targetDynamics.retPhase}</p></div>
                          <div><p className="text-[10px] text-slate-400 uppercase tracking-wide flex items-center gap-1">Return Ejection <button onClick={() => openInfo('Return Ejection')} className="text-slate-500 hover:text-indigo-400"><HelpCircle className="w-3 h-3" /></button></p><p className="text-sm font-mono text-amber-400 mt-0.5">{targetDynamics.retEject}</p></div>
                        </div>
                      </div>

                      {hasAsteroidManeuver && (
                        <div className="mb-6 p-4 bg-amber-900/30 border border-amber-500/50 rounded-lg shadow-inner">
                          <div className="flex items-center gap-2 mb-2"><Orbit className="w-4 h-4 text-amber-400" /><span className="text-xs font-bold text-amber-400 uppercase tracking-wider">Asteroid Mass Class</span></div>
                          <select value={asteroidClass} onChange={(e) => setAsteroidClass(e.target.value)} className="w-full bg-slate-900 border border-amber-500/30 rounded p-2 text-sm text-amber-100 focus:outline-none focus:border-amber-400">
                            {Object.keys(asteroidDvMap).map(cls => <option key={cls} value={cls}>{cls}</option>)}
                          </select>
                        </div>
                      )}

                      <div className="bg-slate-900 rounded-lg p-4 mb-6 border border-slate-700 text-center relative overflow-hidden group">
                        <div className="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-indigo-500 to-emerald-500"></div>
                        <div className="absolute top-2 right-2"><button onClick={() => openInfo('Delta-v (Δv)')} className="text-slate-600 hover:text-indigo-400 p-1"><HelpCircle className="w-4 h-4" /></button></div>
                        <p className="text-sm text-slate-400 mb-1">Total Mission Build Δv</p>
                        <p className="text-3xl font-mono font-bold text-white">{totalMissionDv} <span className="text-sm text-slate-500 font-sans">m/s</span></p>
                      </div>

                      <h3 className="text-sm font-semibold text-slate-400 uppercase tracking-wider mb-3">Maneuver Pool</h3>
                      <div className="space-y-2">
                        {allManeuvers.map(maneuver => (
                          <div key={maneuver.id} className="bg-slate-700/50 p-2 pl-3 rounded flex justify-between items-center border border-transparent hover:border-slate-600 transition-colors">
                            <div className="flex items-center gap-2 overflow-hidden">
                              <button onClick={() => openInfo(maneuver.name, maneuver.description)} className="text-slate-500 hover:text-indigo-400 shrink-0"><HelpCircle className="w-4 h-4" /></button>
                              <span className="text-slate-200 text-sm truncate">{maneuver.name}</span>
                            </div>
                            <span className="font-mono text-slate-400 text-sm shrink-0 ml-2">{maneuver.dv}</span>
                          </div>
                        ))}

                        {!isAddingManeuver ? (
                          <button onClick={() => setIsAddingManeuver(true)} className="w-full mt-2 py-2.5 border border-dashed border-slate-600 rounded text-slate-400 hover:text-emerald-400 hover:border-emerald-500/50 transition-all text-sm flex items-center justify-center gap-2 bg-slate-800/50">
                            <Plus className="w-4 h-4" /> Add Custom Maneuver
                          </button>
                        ) : (
                          <div className="mt-4 bg-slate-900 p-4 rounded-lg border border-indigo-500/50 space-y-4 shadow-xl">
                            <div className="flex justify-between items-center border-b border-slate-700 pb-2">
                              <span className="text-xs text-indigo-300 uppercase tracking-wider font-semibold flex items-center gap-1"><BookOpen className="w-3 h-3" /> Maneuver Estimator</span>
                              <button onClick={() => setIsAddingManeuver(false)} className="text-slate-500 hover:text-white"><X className="w-4 h-4" /></button>
                            </div>
                            <div>
                              <label className="text-[10px] text-slate-400 uppercase mb-1 block">Contextual Presets</label>
                              <select onChange={(e) => { if (!e.target.value) return; const [catIndex, itemIndex] = e.target.value.split('-'); handleSelectPreset(dynamicEstimates[catIndex].items[itemIndex]); }} className="w-full bg-slate-800 border border-slate-600 rounded p-2 text-sm text-white focus:outline-none focus:border-indigo-500" defaultValue="">
                                <option value="" disabled>Select an archetype...</option>
                                {dynamicEstimates.map((cat, cIdx) => <optgroup key={cIdx} label={cat.category}>{cat.items.map((item, iIdx) => <option key={iIdx} value={`${cIdx}-${iIdx}`}>{item.name} (~{item.dv} m/s)</option>)}</optgroup>)}
                              </select>
                            </div>
                            <div className="space-y-3 pt-2 border-t border-slate-800">
                              <div><label className="text-[10px] text-slate-400 uppercase block mb-1">Maneuver Name</label><input type="text" placeholder="e.g., Spaceplane Climb" value={newManeuverName} onChange={(e) => setNewManeuverName(e.target.value)} className="w-full bg-slate-800 border border-slate-600 rounded p-2 text-sm text-white focus:outline-none focus:border-indigo-500" /></div>
                              <div><label className="text-[10px] text-slate-400 uppercase block mb-1">Base Δv Cost</label><input type="number" placeholder="m/s" value={newManeuverDv} onChange={(e) => setNewManeuverDv(e.target.value)} className="w-full bg-slate-800 border border-slate-600 rounded p-2 text-sm text-white focus:outline-none focus:border-indigo-500 font-mono" /></div>
                              <button onClick={saveCustomManeuver} disabled={!newManeuverName || newManeuverDv === ''} className="w-full bg-indigo-600 hover:bg-indigo-500 disabled:bg-slate-700 disabled:text-slate-500 text-white rounded p-2 text-sm transition-colors font-medium mt-2">Add to Mission Pool</button>
                            </div>
                          </div>
                        )}
                      </div>
                    </div>
                  </div>

                  <div className="lg:col-span-2 space-y-4">
                    <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-4">
                      <div className="flex items-center gap-2"><Activity className="w-5 h-5 text-indigo-400" /><h2 className="text-xl font-semibold">Custom Stage Builder</h2></div>
                      <div className="flex items-center gap-2">
                        <div className="relative">
                          <button onClick={() => setIsTemplateMenuOpen(!isTemplateMenuOpen)} className="flex items-center gap-1.5 bg-slate-800 hover:bg-slate-700 border border-slate-600 px-3 py-1.5 rounded-md text-sm font-medium transition-colors text-slate-200">
                            <Layers className="w-4 h-4" /> Load Template {isTemplateMenuOpen ? <ChevronUp className="w-4 h-4 opacity-70" /> : <ChevronDown className="w-4 h-4 opacity-70" />}
                          </button>
                          {isTemplateMenuOpen && (
                            <>
                              <div className="fixed inset-0 z-40" onClick={() => setIsTemplateMenuOpen(false)}></div>
                              <div className="absolute left-0 sm:left-auto sm:right-0 mt-2 w-[85vw] max-w-[280px] sm:w-72 bg-slate-800 border border-slate-600 rounded-lg shadow-2xl z-[100] overflow-hidden origin-top-left sm:origin-top-right">
                                <div className="p-3 bg-slate-900 border-b border-slate-700"><span className="text-xs text-indigo-300 uppercase tracking-wider font-semibold">Mission Blueprints</span></div>
                                <div className="max-h-[60vh] overflow-y-auto custom-scrollbar">
                                  {Object.entries(missionTemplates).map(([key, template]) => (
                                    <button key={key} onClick={() => handleApplyTemplate(key)} className="w-full text-left p-3 hover:bg-slate-700/50 border-b border-slate-700/50 last:border-0 transition-colors group">
                                      <div className="font-medium text-slate-200 group-hover:text-white mb-1">{template.name}</div>
                                      <div className="text-xs text-slate-400 leading-snug">{template.desc}</div>
                                    </button>
                                  ))}
                                </div>
                              </div>
                            </>
                          )}
                        </div>
                        <button onClick={handleAddStage} className="flex items-center gap-1 bg-indigo-600 hover:bg-indigo-500 px-3 py-1.5 rounded-md text-sm font-medium transition-colors"><Plus className="w-4 h-4" /> Add Stage</button>
                      </div>
                    </div>

                    <div className="space-y-4">
                      {customStages.map((stage, index) => {
                        const stageBaseDv = stage.assignedManeuvers.reduce((sum, mId) => { const maneuver = allManeuvers.find(m => m.id === mId); return sum + (maneuver ? maneuver.dv : 0); }, 0);
                        const stageTotal = calculateDv(stageBaseDv, stage.localMargin);
                        const hasAssigned = stage.assignedManeuvers.length > 0;
                        
                        return (
                          <div key={stage.id} className="bg-slate-800 rounded-xl border border-slate-700 overflow-hidden shadow-lg transition-all">
                            <div className="bg-slate-800/80 p-4 border-b border-slate-700 flex flex-col sm:flex-row justify-between sm:items-center gap-4">
                              <div className="flex items-center gap-3 flex-1">
                                <span className="bg-slate-700 text-slate-300 text-xs font-bold px-2 py-1 rounded shrink-0">STAGE {index + 1}</span>
                                <input type="text" value={stage.name} onChange={(e) => handleUpdateStageName(stage.id, e.target.value)} className="bg-transparent border-none focus:ring-0 text-lg font-semibold text-white w-full max-w-[200px] placeholder-slate-500 p-0 focus:outline-none" placeholder="Name this stage..." />
                              </div>
                              <div className="flex items-center justify-between sm:justify-end gap-6">
                                <div className="flex flex-col items-end min-w-[120px]">
                                  <span className="text-[10px] text-slate-400 uppercase tracking-wider mb-1 flex items-center gap-1">Stage Boost (+{stage.localMargin}%) <button onClick={() => openInfo('Stage Boost')} className="text-slate-500 hover:text-indigo-400"><HelpCircle className="w-3 h-3" /></button></span>
                                  <input type="range" min="0" max="50" value={stage.localMargin} onChange={(e) => handleUpdateLocalMargin(stage.id, e.target.value)} className="w-full h-1 bg-slate-700 rounded-lg appearance-none cursor-pointer accent-indigo-500" />
                                </div>
                                <div className="text-right border-l border-slate-700 pl-4"><p className="text-xs text-slate-400">Target Δv</p><p className="font-mono text-xl font-bold text-amber-400">{stageTotal} <span className="text-sm font-sans text-slate-500">m/s</span></p></div>
                                <button onClick={() => handleRemoveStage(stage.id)} className="text-slate-500 hover:text-red-400 p-2 shrink-0"><Trash2 className="w-5 h-5" /></button>
                              </div>
                            </div>

                            <div className="p-4 bg-slate-800/50">
                              <div className="grid grid-cols-2 sm:grid-cols-3 gap-2">
                                {allManeuvers.map(maneuver => {
                                  const isAssigned = stage.assignedManeuvers.includes(maneuver.id);
                                  const isCustom = maneuver.id.startsWith('custom_');
